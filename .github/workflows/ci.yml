name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: govkit
          POSTGRES_PASSWORD: govkit
          POSTGRES_DB: govkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U govkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://govkit:govkit@localhost:5432/govkit
      SECRET_KEY: ci-insecure-key
      DEBUG: "false"
      GOVKIT_SECRET_KEY: "" # set per-job if encrypted-field tests need it
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (black + flake8)
        run: |
          black --check .
          flake8 .
      - name: Django checks + migrations
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
      - name: Collect static (manifest for prod storage)
        run: python manage.py collectstatic --noinput
      - name: Tests
        run: pytest
