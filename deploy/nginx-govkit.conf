# GovKit — install as /etc/nginx/app-proxies/govkit.conf on the dev VM (VM 200),
# then `sudo nginx -t && sudo systemctl reload nginx`.
# The demos.linkedtrust.us server block includes /etc/nginx/app-proxies/*.conf.
# Backend: gunicorn on 127.0.0.1:8062 with BASE_PATH=/govkit (FORCE_SCRIPT_NAME).
# Served at demos.linkedtrust.us/govkit/  ·  Source: /opt/shared/repos/govkit/

location /govkit/static/ {
    alias /opt/shared/repos/govkit/staticfiles/;
    expires 1d;
}

location /govkit/ {
    proxy_pass http://127.0.0.1:8062;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    client_max_body_size 10M;
}
