# GovKit — self-host / dev stack. Brings the app up end-to-end (web + Postgres).
# Copy .env.sample to .env first. For production set DEBUG=false and a real SECRET_KEY.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-govkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-govkit}
      POSTGRES_DB: ${POSTGRES_DB:-govkit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-govkit}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-5432}:5432"

  web:
    build: .
    env_file:
      - .env
    environment:
      # Point Django at the compose db service regardless of host .env DATABASE_URL.
      DATABASE_URL: postgres://${POSTGRES_USER:-govkit}:${POSTGRES_PASSWORD:-govkit}@db:5432/${POSTGRES_DB:-govkit}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8000}:8000"

volumes:
  postgres_data:
